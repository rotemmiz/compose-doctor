# Manual-only. Publishing infra is wired but nothing publishes automatically.
# Default run is a credential-free dry run (publishToMavenLocal). To actually release:
#   1) bump the version in the root build.gradle.kts to a non-SNAPSHOT value
#   2) add repo secrets GRADLE_PUBLISH_KEY / GRADLE_PUBLISH_SECRET
#   3) run this workflow with dry_run = false
name: release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run (publish to mavenLocal only, no portal upload).
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Dry run (publish to mavenLocal)
        if: ${{ inputs.dry_run == 'true' }}
        run: ./gradlew :plugin:publishToMavenLocal

      - name: Publish to Gradle Plugin Portal
        if: ${{ inputs.dry_run != 'true' }}
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: ./gradlew :plugin:publishPlugins
