name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Version consistency
        run: ./scripts/check-version.sh

      - name: Build & test
        run: ./gradlew build

      - name: Smoke-test the plugin against the playground
        run: ./gradlew -p playground composeDoctor

      - name: Upload compose-doctor reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-doctor-reports
          path: |
            playground/build/reports/compose-doctor/score.json
            playground/build/reports/detekt/detekt.sarif
          if-no-files-found: ignore
