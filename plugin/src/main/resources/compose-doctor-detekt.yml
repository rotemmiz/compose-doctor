# compose-doctor's curated default policy. Layered on detekt's defaults
# (buildUponDefaultConfig = true). Users override this via their own config (see docs).
#
# Policy:
#   - Core = the compose-rules `Compose` ruleset.
#   - Plus detekt's genuine-bug rulesets (potential-bugs, coroutines) and a few real smells.
#   - Pure style/formatting/naming noise is disabled so the score reflects Compose health + bugs,
#     not formatting.
#   - Two severity tiers: error (-1.5) for genuine correctness bugs, warning (-0.75) for design.
config:
  validation: false

# --- Disabled: opinionated style/formatting/naming that would dominate the score ---
style:
  active: false
naming:
  active: false
comments:
  active: false

# --- Genuine bugs: error tier ---
potential-bugs:
  severity: error
coroutines:
  SleepInsteadOfDelay:
    severity: error
exceptions:
  SwallowedException:
    severity: error
empty-blocks:
  EmptyCatchBlock:
    severity: error

# --- Compose ruleset ---
Compose:
  active: true
  Material2:
    active: false
  UnstableCollections:
    active: true

  # error tier: correctness / state / recomposition bugs
  RememberMissing:
    active: true
    severity: error
  RememberContentMissing:
    active: true
    severity: error
  MutableStateParam:
    active: true
    severity: error
  MutableStateAutoboxing:
    active: true
    severity: error
  LambdaParameterInRestartableEffect:
    active: true
    severity: error
  ContentEmitterReturningValues:
    active: true
    severity: error
  MultipleEmitters:
    active: true
    severity: error
  ContentSlotReused:
    active: true
    severity: error
  ViewModelForwarding:
    active: true
    severity: error
  ViewModelInjection:
    active: true
    severity: error
  CompositionLocalAllowlist:
    active: true
    severity: error

  # warning tier: API shape, naming, design
  ComposableNaming:
    active: true
  ComposableParamOrder:
    active: true
  ComposableAnnotationNaming:
    active: true
  ModifierMissing:
    active: true
  ModifierWithoutDefault:
    active: true
  ModifierNaming:
    active: true
  ModifierReused:
    active: true
  ModifierNotUsedAtRoot:
    active: true
  ModifierClickableOrder:
    active: true
  ModifierComposed:
    active: true
  ContentTrailingLambda:
    active: true
  LambdaParameterEventTrailing:
    active: true
  DefaultsVisibility:
    active: true
  ParameterNaming:
    active: true
  PreviewPublic:
    active: true
  PreviewAnnotationNaming:
    active: true
  CompositionLocalNaming:
    active: true
